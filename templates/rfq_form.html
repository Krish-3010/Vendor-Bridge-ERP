{% extends "base.html" %}
{% block title %}Create RFQ | VendorBridge{% endblock %}
{% block page_title %}Create RFQ{% endblock %}
{% block content %}
<section class="panel">
  <form method="post" class="form-grid wide">
    {% csrf_token %}
    {% for field in form %}
      <label>{{ field.label }} {{ field }}{% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}</label>
    {% endfor %}
    <div class="form-actions">
      <button class="btn primary">Save & Send to Vendors</button>
      <a class="btn" href="{% url 'rfqs' %}">Save as Draft</a>
    </div>
  </form>
</section>
{% endblock %}
